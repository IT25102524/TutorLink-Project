# =============================================
# TutorLink Application Settings
# =============================================

spring.datasource.url=jdbc:mysql://localhost:3306/tutorlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=***Password****
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings - tables will be created automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JSP view settings
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

server.port=8080
